<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型兼容性测试</title>
<style>
  body { font-family: monospace; padding: 1rem; background: #1a1d28; color: #e2e8f0; }
  .pass { color: #22c55e; } .fail { color: #ef4444; } .warn { color: #fbbf24; }
  pre { background: #0f111a; padding: 0.5rem; border-radius: 6px; overflow-x: auto; }
</style>
</head>
<body>
<h2>ONNX 模型兼容性测试</h2>
<pre id="log"></pre>
<script src="/vendor/ort.all.min.js"></script>
<script>
const log = document.getElementById('log');
function L(msg, cls) { log.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

async function testModel(name, path, inputShape, testInput) {
  L(`\n── 测试 ${name} ──`, 'warn');
  try {
    L(`加载 ${path}...`);
    const resp = await fetch(path);
    if (!resp.ok) { L(`✗ 下载失败 HTTP ${resp.status}`, 'fail'); return false; }
    const buf = await resp.arrayBuffer();
    L(`文件大小: ${(buf.byteLength/1024/1024).toFixed(1)}MB`);

    L(`创建 InferenceSession...`);
    const t0 = performance.now();
    const session = await ort.InferenceSession.create(buf, {
      executionProviders: ['webgpu', 'wasm'],
      graphOptimizationLevel: 'all',
    });
    L(`Session 创建成功 (${(performance.now()-t0).toFixed(0)}ms)`);
    L(`输入: ${JSON.stringify(session.inputNames)}`);
    L(`输出: ${JSON.stringify(session.outputNames)}`);

    // Try inference
    const tensor = new ort.Tensor('float32', new Float32Array(testInput), inputShape);
    L(`运行推理 (input ${JSON.stringify(inputShape)})...`);
    const t1 = performance.now();
    const result = await session.run({ [session.inputNames[0]]: tensor });
    L(`推理成功 (${(performance.now()-t1).toFixed(0)}ms)`);

    const outName = session.outputNames[0];
    const out = result[outName];
    L(`输出 shape: ${JSON.stringify(out.dims)}`);
    L(`输出类型: ${out.type}`);
    const data = Array.from(out.data).slice(0, 10);
    L(`输出前10个值: [${data.map(v=>v.toFixed(4)).join(', ')}]`);

    L(`✓ ${name} 兼容！`, 'pass');
    return true;
  } catch(e) {
    L(`✗ ${name} 不兼容: ${e.message}`, 'fail');
    return false;
  }
}

async function run() {
  ort.env.wasm.wasmPaths = '/ort/';
  ort.env.wasm.numThreads = 1;

  L(`ONNX Runtime: ${ort.env.version || 'unknown'}`);
  L(`后端: webgpu → wasm`);

  // Test 1: formula-det (640x640 input, 3 channels)
  await testModel(
    'formula-det (数学公式检测)',
    '/models/mathcraft-formula-det/mathcraft-mfd.onnx',
    [1, 3, 640, 640],
    new Array(3*640*640).fill(0.5) // dummy gray input
  );

  // Test 2: text-det (varies, try 640x640)
  await testModel(
    'text-det (文字检测 PP-OCRv5 DB)',
    '/models/mathcraft-text-det/ppocrv5_mobile_det.onnx',
    [1, 3, 640, 640],
    new Array(3*640*640).fill(0.5)
  );

  // Test 3: text-rec (1x3x32x~)
  await testModel(
    'text-rec (文字识别 PP-OCRv5 CRNN)',
    '/models/mathcraft-text-rec/ppocrv5_mobile_rec.onnx',
    [1, 3, 32, 100],
    new Float32Array(3*32*100).fill(0)
  );

  L(`\n── 测试完成 ──`);
}

run().catch(e => L(`Fatal: ${e.message}`, 'fail'));
</script>
</body>
</html>
