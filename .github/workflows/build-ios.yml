name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'
        type: string
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: false
        type: boolean

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup CocoaPods
        run: |
          gem install cocoapods --no-document

      - name: Set version
        run: |
          node -e "const p=require('./package.json');p.version='${{ inputs.version }}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "Version set to ${{ inputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup iOS platform
        run: |
          # Remove stale partial ios/ so cap add creates a fresh one
          rm -rf ios/App
          npx cap add ios
          # Copy ExportOptions back
          cp .github/ExportOptions.plist ios/App/ExportOptions.plist

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update 2>&1 || echo "Pods skipped"

      - name: Build iOS archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath App.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 || echo "Archive requires Apple Developer setup"

      - name: Export IPA
        if: success()
        working-directory: ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ../ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 || echo "Export requires signing config"

      - name: Upload IPA
        if: hashFiles('ios/App/build/App.ipa') != ''
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-v${{ inputs.version }}-iOS
          path: ios/App/build/App.ipa

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: ios/App/build/App.ipa
