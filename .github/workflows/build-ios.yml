name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'
        type: string
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: false
        type: boolean

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup CocoaPods
        run: |
          gem install cocoapods --no-document

      - name: Set version
        run: |
          node -e "const p=require('./package.json');p.version='${{ inputs.version }}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "Version set to ${{ inputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup iOS platform
        run: |
          rm -rf ios
          npx cap add ios
          cp .github/ExportOptions.plist ios/App/ExportOptions.plist

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update 2>&1 || echo "Pods skipped"

      - name: Build for Simulator (no account needed)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 || echo "Build failed"

      - name: Package Simulator App
        working-directory: ios/App
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Build/Products/*" 2>/dev/null | head -1)
          if [ -n "$APP" ]; then mkdir -p build && cp -r "$APP" build/ && echo "Packaged: $APP"; fi

      - name: Upload Simulator App
        if: hashFiles('ios/App/build/App.app') != ''
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-v${{ inputs.version }}-iOS-simulator
          path: ios/App/build/App.app
