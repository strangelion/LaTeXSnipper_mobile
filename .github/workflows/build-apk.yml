name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        default: '1.0.0'
        type: string
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: false
        type: boolean

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Generate release keystore
        run: |
          mkdir -p ~/.android
          # Debug keystore (for assembleDebug)
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          # Release keystore (for assembleRelease, V1+V2+V3 signed)
          # Use GitHub Secrets if available, otherwise generate a CI-only key
          cd android/app
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            echo "storeFile=release.keystore" > keystore.properties
            echo "storePassword=${KEYSTORE_PASSWORD}" >> keystore.properties
            echo "keyAlias=${KEY_ALIAS:-latexsnipper}" >> keystore.properties
            echo "keyPassword=${KEY_PASSWORD:-${KEYSTORE_PASSWORD}}" >> keystore.properties
            echo "Using user-provided keystore"
          else
            keytool -genkey -v -keystore release.keystore \
              -storepass latexsnipper -alias latexsnipper -keypass latexsnipper \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=LaTeXSnipper,O=LaTeXSnipper,C=CN"
            echo "storeFile=release.keystore" > keystore.properties
            echo "storePassword=latexsnipper" >> keystore.properties
            echo "keyAlias=latexsnipper" >> keystore.properties
            echo "keyPassword=latexsnipper" >> keystore.properties
            echo "Using CI-generated keystore (no Secrets set)"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set version
        run: |
          # Update package.json
          node -e "const p=require('./package.json');p.version='${{ inputs.version }}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          # Update Android version
          VER_CODE=$(echo ${{ inputs.version }} | tr -d '.')
          sed -i "s/versionCode .*/versionCode $VER_CODE/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ inputs.version }}\"/" android/app/build.gradle
          echo "Version set to ${{ inputs.version }} (code: $VER_CODE)"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Release APK (signed V1+V2+V3 + R8 obfuscated)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            echo "Release APK size: $(du -sh "$APK" | cut -f1)"
            echo "--- Signature scheme ---"
            apksigner verify --verbose "$APK" 2>&1 || true
          fi

      - name: Get version
        id: version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-v${{ inputs.version }}-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          generate_release_notes: true
