name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Generate release keystore
        run: |
          mkdir -p ~/.android
          # Debug keystore (for assembleDebug)
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          # Release keystore (for assembleRelease, V1+V2+V3 signed)
          # Use GitHub Secrets if available, otherwise generate a CI-only key
          cd android/app
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            echo "storeFile=release.keystore" > keystore.properties
            echo "storePassword=${KEYSTORE_PASSWORD}" >> keystore.properties
            echo "keyAlias=${KEY_ALIAS:-latexsnipper}" >> keystore.properties
            echo "keyPassword=${KEY_PASSWORD:-${KEYSTORE_PASSWORD}}" >> keystore.properties
            echo "Using user-provided keystore"
          else
            keytool -genkey -v -keystore release.keystore \
              -storepass latexsnipper -alias latexsnipper -keypass latexsnipper \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=LaTeXSnipper,O=LaTeXSnipper,C=CN"
            echo "storeFile=release.keystore" > keystore.properties
            echo "storePassword=latexsnipper" >> keystore.properties
            echo "keyAlias=latexsnipper" >> keystore.properties
            echo "keyPassword=latexsnipper" >> keystore.properties
            echo "Using CI-generated keystore (no Secrets set)"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Release APK (signed V1+V2+V3 + R8 obfuscated)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            echo "Release APK size: $(du -sh "$APK" | cut -f1)"
            echo "--- Signature scheme ---"
            apksigner verify --verbose "$APK" 2>&1 || true
          fi

      - name: Get version
        id: version
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LaTeXSnipper-v${{ steps.version.outputs.version }}-release
          path: android/app/build/outputs/apk/release/app-release.apk
